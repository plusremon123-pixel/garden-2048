<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>Node Asset Preview</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #1a1a2e; font-family: sans-serif; padding: 24px; }
  h1 { color: #fff; text-align: center; font-size: 18px; margin-bottom: 24px; letter-spacing: 2px; }
  .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 2px; }
  .col-header {
    text-align: center; padding: 10px 0; font-size: 13px; font-weight: 700;
    letter-spacing: 1px; border-radius: 8px 8px 0 0;
  }
  .spring-h  { background: #f2c8d4; color: #7a3348; }
  .summer-h  { background: #8ab870; color: #2a4a18; }
  .autumn-h  { background: #c87840; color: #fff; }
  .winter-h  { background: #a0c0e0; color: #1a3050; }

  .cell {
    display: flex; flex-direction: column; align-items: center;
    padding: 16px 8px; gap: 8px;
  }
  .spring-c  { background: #fce8ef; }
  .summer-c  { background: #d8eed0; }
  .autumn-c  { background: #f0dcc0; }
  .winter-c  { background: #d8ecf8; }

  .cell img { width: 100px; height: 113px; object-fit: contain; }
  .label {
    font-size: 11px; font-weight: 700; text-transform: uppercase;
    letter-spacing: 1px; opacity: 0.7;
  }

  .state-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 2px; }
  .state-label {
    grid-column: 1 / -1; text-align: center;
    background: #2a2a4a; color: #aaa; padding: 6px;
    font-size: 12px; font-weight: 700; letter-spacing: 2px;
  }
</style>
</head>
<body>
<h1>🌿 NODE ASSETS — 4 Seasons × 3 States</h1>

<div class="grid">
  <div class="col-header spring-h">🌸 SPRING</div>
  <div class="col-header summer-h">🌿 SUMMER</div>
  <div class="col-header autumn-h">🍂 AUTUMN</div>
  <div class="col-header winter-h">❄️ WINTER</div>

  <!-- STAY (current) -->
  <div style="grid-column:1/-1; background:#2a2a4a; color:#aaa; text-align:center; padding:6px; font-size:12px; font-weight:700; letter-spacing:2px;">
    STAY (current — float animation)
  </div>
  <div class="cell spring-c"><img src="/nodes/spring_stay.png"><span class="label">spring_stay</span></div>
  <div class="cell summer-c"><img src="/nodes/summer_stay.png"><span class="label">summer_stay</span></div>
  <div class="cell autumn-c"><img src="/nodes/autumn_stay.png"><span class="label">autumn_stay</span></div>
  <div class="cell winter-c"><img src="/nodes/winter_stay.png"><span class="label">winter_stay</span></div>

  <!-- READY (available) -->
  <div style="grid-column:1/-1; background:#2a2a4a; color:#aaa; text-align:center; padding:6px; font-size:12px; font-weight:700; letter-spacing:2px;">
    READY (available)
  </div>
  <div class="cell spring-c"><img src="/nodes/spring_ready.png"><span class="label">spring_ready</span></div>
  <div class="cell summer-c"><img src="/nodes/summer_ready.png"><span class="label">summer_ready</span></div>
  <div class="cell autumn-c"><img src="/nodes/autumn_ready.png"><span class="label">autumn_ready</span></div>
  <div class="cell winter-c"><img src="/nodes/winter_ready.png"><span class="label">winter_ready</span></div>

  <!-- END (done) -->
  <div style="grid-column:1/-1; background:#2a2a4a; color:#aaa; text-align:center; padding:6px; font-size:12px; font-weight:700; letter-spacing:2px;">
    END (done — opacity 0.72)
  </div>
  <div class="cell spring-c"><img src="/nodes/spring_end.png" style="opacity:0.72"><span class="label">spring_end</span></div>
  <div class="cell summer-c"><img src="/nodes/summer_end.png" style="opacity:0.72"><span class="label">summer_end</span></div>
  <div class="cell autumn-c"><img src="/nodes/autumn_end.png" style="opacity:0.72"><span class="label">autumn_end</span></div>
  <div class="cell winter-c"><img src="/nodes/winter_end.png" style="opacity:0.72"><span class="label">winter_end</span></div>
</div>

</body>
</html>
