<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256">
  <defs>
    <!-- Pot body radial gradient -->
    <radialGradient id="potBodyGrad" cx="35%" cy="40%" r="65%" fx="35%" fy="40%">
      <stop offset="0%" stop-color="#F09070"/>
      <stop offset="45%" stop-color="#E08060"/>
      <stop offset="100%" stop-color="#A84020"/>
    </radialGradient>

    <!-- Pot rim gradient -->
    <linearGradient id="potRimGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ECA070"/>
      <stop offset="100%" stop-color="#C06040"/>
    </linearGradient>

    <!-- Soil gradient -->
    <radialGradient id="soilGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#9A6838"/>
      <stop offset="100%" stop-color="#7A5028"/>
    </radialGradient>

    <!-- Left leaf gradient -->
    <linearGradient id="leafLeftGrad" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#9ED870"/>
      <stop offset="50%" stop-color="#7EC050"/>
      <stop offset="100%" stop-color="#3A6820"/>
    </linearGradient>

    <!-- Right leaf gradient -->
    <linearGradient id="leafRightGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#9ED870"/>
      <stop offset="50%" stop-color="#7EC050"/>
      <stop offset="100%" stop-color="#3A6820"/>
    </linearGradient>

    <!-- Petal radial gradient -->
    <radialGradient id="petalGrad" cx="50%" cy="60%" r="50%">
      <stop offset="0%" stop-color="#FDD8EA"/>
      <stop offset="60%" stop-color="#F0A0C0"/>
      <stop offset="100%" stop-color="#E07898"/>
    </radialGradient>

    <!-- Flower center gradient -->
    <radialGradient id="centerGrad" cx="40%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#FFE860"/>
      <stop offset="60%" stop-color="#F0C030"/>
      <stop offset="100%" stop-color="#D09020"/>
    </radialGradient>

    <!-- Petal shading at base -->
    <radialGradient id="petalShadow" cx="50%" cy="100%" r="60%">
      <stop offset="0%" stop-color="rgba(180,60,90,0.25)"/>
      <stop offset="100%" stop-color="rgba(180,60,90,0)"/>
    </radialGradient>

    <!-- Stem gradient -->
    <linearGradient id="stemGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#4A7830"/>
      <stop offset="40%" stop-color="#5A8840"/>
      <stop offset="100%" stop-color="#3A6820"/>
    </linearGradient>

    <!-- Drop shadow filter for overall softness -->
    <filter id="softShadow" x="-5%" y="-5%" width="110%" height="110%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="2.5" result="blur"/>
      <feOffset dx="0" dy="1" result="offsetBlur"/>
      <feComposite in="SourceGraphic" in2="offsetBlur" operator="over"/>
    </filter>
  </defs>

  <!-- Contact shadow -->
  <ellipse cx="128" cy="246" rx="58" ry="11" fill="rgba(50,20,5,0.28)"/>

  <!-- ===== POT BODY ===== -->
  <!-- Trapezoid pot body: wider at top (56–200 at y=148), narrower at bottom (72–184 at y=240) -->
  <path d="M 56 148 L 200 148 L 184 240 L 72 240 Z" fill="url(#potBodyGrad)"/>

  <!-- Pot body right shadow overlay -->
  <path d="M 200 148 L 184 240 L 155 240 L 168 148 Z" fill="rgba(0,0,0,0.16)"/>

  <!-- Pot body left highlight overlay -->
  <path d="M 56 148 L 72 240 L 100 240 L 87 148 Z" fill="rgba(255,200,160,0.22)"/>

  <!-- ===== POT RIM ===== -->
  <!-- Rim body (thick band) -->
  <rect x="50" y="140" width="156" height="16" rx="3" ry="3" fill="url(#potRimGrad)"/>
  <!-- Rim top ellipse -->
  <ellipse cx="128" cy="140" rx="78" ry="10" fill="#ECA070"/>
  <!-- Rim bottom ellipse (underside shadow) -->
  <ellipse cx="128" cy="156" rx="72" ry="8" fill="#B05030"/>
  <!-- Rim highlight -->
  <ellipse cx="118" cy="139" rx="40" ry="5" fill="rgba(255,220,180,0.38)"/>

  <!-- ===== SOIL ===== -->
  <ellipse cx="128" cy="146" rx="64" ry="11" fill="url(#soilGrad)"/>
  <!-- Soil dark edge -->
  <ellipse cx="128" cy="147" rx="60" ry="8" fill="rgba(60,30,10,0.22)"/>
  <!-- Soil highlight -->
  <ellipse cx="116" cy="144" rx="22" ry="5" fill="rgba(160,110,60,0.30)"/>

  <!-- ===== STEM ===== -->
  <path d="M 128 146 C 124 130, 120 118, 122 108 C 124 98, 130 88, 128 72"
        stroke="url(#stemGrad)" stroke-width="7" fill="none" stroke-linecap="round"/>
  <!-- Stem highlight -->
  <path d="M 128 146 C 124 130, 120 118, 122 108 C 124 98, 130 88, 128 72"
        stroke="rgba(180,240,120,0.28)" stroke-width="3" fill="none" stroke-linecap="round"/>

  <!-- ===== LEAVES ===== -->
  <!-- Left leaf: from stem ~y=108, extends toward (56,82) -->
  <path d="M 122 108 C 100 96, 72 85, 56 82 C 68 92, 80 110, 100 112 Z"
        fill="url(#leafLeftGrad)"/>
  <!-- Left leaf midrib vein -->
  <path d="M 122 108 C 100 96, 72 85, 56 82"
        stroke="#3A6820" stroke-width="1.5" fill="none" stroke-linecap="round" opacity="0.55"/>
  <!-- Left leaf highlight -->
  <path d="M 100 96 C 88 90, 72 87, 62 85"
        stroke="rgba(200,255,150,0.30)" stroke-width="2.5" fill="none" stroke-linecap="round"/>

  <!-- Right leaf: from stem ~y=96, extends toward (188,72) -->
  <path d="M 126 96 C 148 82, 172 70, 188 72 C 178 84, 162 98, 140 100 Z"
        fill="url(#leafRightGrad)"/>
  <!-- Right leaf midrib vein -->
  <path d="M 126 96 C 148 82, 172 70, 188 72"
        stroke="#3A6820" stroke-width="1.5" fill="none" stroke-linecap="round" opacity="0.55"/>
  <!-- Right leaf highlight -->
  <path d="M 148 84 C 162 76, 176 73, 184 74"
        stroke="rgba(200,255,150,0.30)" stroke-width="2.5" fill="none" stroke-linecap="round"/>

  <!-- ===== FLOWER PETALS ===== -->
  <!-- 6 petals, rotated 60° apart, center at (128,72), offset 22px, rx=13 ry=20 -->

  <!-- Petal 0: 0° (top) -->
  <ellipse cx="128" cy="50" rx="13" ry="20" fill="url(#petalGrad)" transform="rotate(0, 128, 72)"/>
  <ellipse cx="128" cy="50" rx="13" ry="20" fill="url(#petalShadow)" transform="rotate(0, 128, 72)" opacity="0.7"/>

  <!-- Petal 1: 60° -->
  <ellipse cx="128" cy="50" rx="13" ry="20" fill="url(#petalGrad)" transform="rotate(60, 128, 72)"/>
  <ellipse cx="128" cy="50" rx="13" ry="20" fill="url(#petalShadow)" transform="rotate(60, 128, 72)" opacity="0.7"/>

  <!-- Petal 2: 120° -->
  <ellipse cx="128" cy="50" rx="13" ry="20" fill="url(#petalGrad)" transform="rotate(120, 128, 72)"/>
  <ellipse cx="128" cy="50" rx="13" ry="20" fill="url(#petalShadow)" transform="rotate(120, 128, 72)" opacity="0.7"/>

  <!-- Petal 3: 180° (bottom) -->
  <ellipse cx="128" cy="50" rx="13" ry="20" fill="url(#petalGrad)" transform="rotate(180, 128, 72)"/>
  <ellipse cx="128" cy="50" rx="13" ry="20" fill="url(#petalShadow)" transform="rotate(180, 128, 72)" opacity="0.7"/>

  <!-- Petal 4: 240° -->
  <ellipse cx="128" cy="50" rx="13" ry="20" fill="url(#petalGrad)" transform="rotate(240, 128, 72)"/>
  <ellipse cx="128" cy="50" rx="13" ry="20" fill="url(#petalShadow)" transform="rotate(240, 128, 72)" opacity="0.7"/>

  <!-- Petal 5: 300° -->
  <ellipse cx="128" cy="50" rx="13" ry="20" fill="url(#petalGrad)" transform="rotate(300, 128, 72)"/>
  <ellipse cx="128" cy="50" rx="13" ry="20" fill="url(#petalShadow)" transform="rotate(300, 128, 72)" opacity="0.7"/>

  <!-- ===== FLOWER CENTER ===== -->
  <circle cx="128" cy="72" r="18" fill="url(#centerGrad)"/>
  <!-- Center outline for definition -->
  <circle cx="128" cy="72" r="18" fill="none" stroke="#B87820" stroke-width="1.2" opacity="0.60"/>
  <!-- Center highlight -->
  <circle cx="122" cy="67" r="6" fill="rgba(255,255,200,0.50)"/>
  <!-- Center small dots for texture -->
  <circle cx="128" cy="72" r="4" fill="rgba(180,100,10,0.25)"/>
</svg>
