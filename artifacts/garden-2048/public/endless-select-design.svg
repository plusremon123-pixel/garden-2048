<svg width="390" height="844" viewBox="0 0 390 844" xmlns="http://www.w3.org/2000/svg" font-family="'Pretendard', 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif">
  <defs>
    <!-- 배경 그라디언트 -->
    <linearGradient id="bg" x1="0" y1="0" x2="0.3" y2="1">
      <stop offset="0%"   stop-color="#060d14"/>
      <stop offset="52%"  stop-color="#071a0e"/>
      <stop offset="100%" stop-color="#060d14"/>
    </linearGradient>
    <!-- 선택 카드 배경 (보통) -->
    <linearGradient id="cardNormal" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#064e3b" stop-opacity="0.92"/>
      <stop offset="100%" stop-color="#08120c" stop-opacity="0.95"/>
    </linearGradient>
    <!-- 시작 버튼 그라디언트 -->
    <linearGradient id="btnGreen" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#22c55e"/>
      <stop offset="100%" stop-color="#16a34a"/>
    </linearGradient>
    <!-- 카드 아이콘 배경 (선택) -->
    <radialGradient id="glowNormal" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#34d399" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#34d399" stop-opacity="0"/>
    </radialGradient>
    <!-- 버튼 glow -->
    <filter id="btnGlow" x="-10%" y="-30%" width="120%" height="160%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <!-- 카드 선택 glow -->
    <filter id="cardGlow" x="-8%" y="-20%" width="116%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <!-- AD 바 blur -->
    <filter id="adBlur">
      <feGaussianBlur stdDeviation="2"/>
    </filter>
  </defs>

  <!-- ── 배경 ── -->
  <rect width="390" height="844" fill="url(#bg)"/>

  <!-- 별 파티클 -->
  <g fill="white" opacity="0.6">
    <circle cx="42"  cy="95"  r="1.2" opacity="0.5"/>
    <circle cx="118" cy="52"  r="0.9" opacity="0.7"/>
    <circle cx="205" cy="78"  r="1.5" opacity="0.4"/>
    <circle cx="290" cy="110" r="0.8" opacity="0.6"/>
    <circle cx="355" cy="68"  r="1.1" opacity="0.5"/>
    <circle cx="22"  cy="200" r="1.0" opacity="0.4"/>
    <circle cx="340" cy="185" r="1.3" opacity="0.55"/>
    <circle cx="160" cy="240" r="0.9" opacity="0.45"/>
    <circle cx="75"  cy="310" r="1.2" opacity="0.35"/>
    <circle cx="320" cy="295" r="0.8" opacity="0.5"/>
    <circle cx="195" cy="680" r="1.1" opacity="0.3"/>
    <circle cx="50"  cy="720" r="0.9" opacity="0.4"/>
    <circle cx="350" cy="650" r="1.3" opacity="0.35"/>
    <circle cx="268" cy="745" r="0.8" opacity="0.45"/>
    <circle cx="130" cy="760" r="1.0" opacity="0.3"/>
  </g>

  <!-- 중앙 그린 글로우 -->
  <ellipse cx="195" cy="380" rx="180" ry="220" fill="#34d399" opacity="0.03"/>

  <!-- 포자 파티클 -->
  <g fill="#a7f3d0" opacity="0.5">
    <circle cx="60"  cy="620" r="2.5"/>
    <circle cx="145" cy="680" r="2"/>
    <circle cx="300" cy="640" r="2.5"/>
    <circle cx="360" cy="700" r="2"/>
    <circle cx="220" cy="750" r="2"/>
    <circle cx="30"  cy="760" r="1.5"/>
    <circle cx="340" cy="780" r="2"/>
  </g>

  <!-- 풀잎 실루엣 (하단 AD 위) -->
  <g fill="#34d399" opacity="0.08">
    <rect x="18"  y="769" width="6"  height="35" rx="3"/>
    <rect x="55"  y="775" width="5"  height="29" rx="2.5"/>
    <rect x="90"  y="772" width="7"  height="32" rx="3.5"/>
    <rect x="140" y="776" width="5"  height="28" rx="2.5"/>
    <rect x="200" y="770" width="8"  height="34" rx="4"/>
    <rect x="258" y="774" width="5"  height="30" rx="2.5"/>
    <rect x="305" y="771" width="7"  height="33" rx="3.5"/>
    <rect x="352" y="775" width="5"  height="29" rx="2.5"/>
  </g>

  <!-- ── 상단 AD 바 ── -->
  <rect width="390" height="40" fill="white" fill-opacity="0.55"/>
  <rect y="39" width="390" height="1" fill="white" fill-opacity="0.4"/>
  <text x="195" y="25" text-anchor="middle" font-size="11" font-weight="500" fill="#1a1a1a" fill-opacity="0.3">AD</text>

  <!-- ── 홈 버튼 ── -->
  <rect x="16" y="50" width="68" height="34" rx="10" fill="white" fill-opacity="0.06" stroke="white" stroke-opacity="0.09" stroke-width="1"/>
  <text x="50" y="72" text-anchor="middle" font-size="14" font-weight="600" fill="white" fill-opacity="0.45">← 홈</text>

  <!-- ── 타이틀 ── -->
  <text x="195" y="126" text-anchor="middle" font-size="28" font-weight="900" fill="white" letter-spacing="-0.5">무한 게임</text>
  <!-- 타이틀 glow -->
  <text x="195" y="126" text-anchor="middle" font-size="28" font-weight="900" fill="#34d399" fill-opacity="0.3" filter="url(#cardGlow)" letter-spacing="-0.5">무한 게임</text>
  <text x="195" y="150" text-anchor="middle" font-size="14" font-weight="600" fill="white" fill-opacity="0.65">난이도를 선택하세요</text>

  <!-- ══════════════════════════════════════ -->
  <!-- ── 카드 1: 쉬움 (비선택) ── -->
  <!-- ══════════════════════════════════════ -->
  <g opacity="0.7" transform="scale(0.98) translate(3.9, 3.9)">
    <!-- 카드 배경 -->
    <rect x="16" y="274" width="358" height="76" rx="16" fill="white" fill-opacity="0.03" stroke="white" stroke-opacity="0.08" stroke-width="1.5"/>
    <!-- 아이콘 박스 -->
    <rect x="32" y="287" width="52" height="52" rx="14" fill="white" fill-opacity="0.05" stroke="white" stroke-opacity="0.1" stroke-width="1.5"/>
    <text x="58" y="320" text-anchor="middle" font-size="26">🌱</text>
    <!-- 텍스트 -->
    <text x="102" y="314" font-size="20" font-weight="900" fill="white" fill-opacity="0.75">쉬움</text>
    <text x="102" y="333" font-size="13" font-weight="500" fill="white" fill-opacity="0.28">5×5</text>
    <!-- 선택 원 (비선택) -->
    <circle cx="348" cy="312" r="13" fill="transparent" stroke="white" stroke-opacity="0.15" stroke-width="1.5"/>
  </g>

  <!-- ══════════════════════════════════════ -->
  <!-- ── 카드 2: 보통 (선택됨) ── -->
  <!-- ══════════════════════════════════════ -->
  <!-- glow 효과 -->
  <rect x="16" y="360" width="358" height="76" rx="16" fill="#34d399" fill-opacity="0.12" filter="url(#cardGlow)"/>
  <!-- 카드 배경 -->
  <rect x="16" y="360" width="358" height="76" rx="16" fill="url(#cardNormal)" stroke="#34d399" stroke-opacity="0.6" stroke-width="1.5"/>
  <!-- 아이콘 박스 -->
  <rect x="32" y="373" width="52" height="52" rx="14" fill="#34d399" fill-opacity="0.1" stroke="#34d399" stroke-opacity="0.5" stroke-width="1.5"/>
  <!-- 아이콘 glow -->
  <ellipse cx="58" cy="399" rx="26" ry="26" fill="url(#glowNormal)"/>
  <text x="58" y="406" text-anchor="middle" font-size="26">🌿</text>
  <!-- 텍스트 -->
  <text x="102" y="400" font-size="20" font-weight="900" fill="white">보통</text>
  <text x="102" y="419" font-size="13" font-weight="500" fill="#34d399" fill-opacity="0.8">6×6</text>
  <!-- 체크 원 (선택) -->
  <circle cx="348" cy="398" r="13" fill="#34d399"/>
  <text x="348" y="403" text-anchor="middle" font-size="13" font-weight="900" fill="#052e16">✓</text>

  <!-- ══════════════════════════════════════ -->
  <!-- ── 카드 3: 어려움 (비선택) ── -->
  <!-- ══════════════════════════════════════ -->
  <g opacity="0.7" transform="scale(0.98) translate(3.9, 9)">
    <!-- 카드 배경 -->
    <rect x="16" y="446" width="358" height="76" rx="16" fill="white" fill-opacity="0.03" stroke="white" stroke-opacity="0.08" stroke-width="1.5"/>
    <!-- 아이콘 박스 -->
    <rect x="32" y="459" width="52" height="52" rx="14" fill="white" fill-opacity="0.05" stroke="white" stroke-opacity="0.1" stroke-width="1.5"/>
    <text x="58" y="492" text-anchor="middle" font-size="26">🌵</text>
    <!-- 텍스트 -->
    <text x="102" y="486" font-size="20" font-weight="900" fill="white" fill-opacity="0.75">어려움</text>
    <text x="102" y="505" font-size="13" font-weight="500" fill="white" fill-opacity="0.28">6×6</text>
    <!-- 선택 원 (비선택) -->
    <circle cx="348" cy="484" r="13" fill="transparent" stroke="white" stroke-opacity="0.15" stroke-width="1.5"/>
  </g>

  <!-- ── 시작 버튼 ── -->
  <!-- glow -->
  <rect x="16" y="762" width="358" height="54" rx="16" fill="#22c55e" fill-opacity="0.35" filter="url(#btnGlow)"/>
  <!-- 버튼 -->
  <rect x="16" y="762" width="358" height="54" rx="16" fill="url(#btnGreen)" stroke="#4ade80" stroke-opacity="0.4" stroke-width="1.5"/>
  <text x="195" y="795" text-anchor="middle" font-size="17" font-weight="900" fill="white" letter-spacing="0.3">시작</text>

  <!-- ── 하단 AD 바 ── -->
  <rect x="0" y="804" width="390" height="40" fill="white" fill-opacity="0.55"/>
  <rect y="804" width="390" height="1" fill="white" fill-opacity="0.4"/>
  <text x="195" y="829" text-anchor="middle" font-size="11" font-weight="500" fill="#1a1a1a" fill-opacity="0.3">AD</text>

</svg>
