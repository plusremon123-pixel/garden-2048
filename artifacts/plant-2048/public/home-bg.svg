<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 390 420" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#b8ddf0"/>
      <stop offset="35%" stop-color="#c8e8d8"/>
      <stop offset="100%" stop-color="#a0cc98"/>
    </linearGradient>
    <linearGradient id="pathFill" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#b8925a"/>
      <stop offset="50%" stop-color="#cca870"/>
      <stop offset="100%" stop-color="#b8925a"/>
    </linearGradient>
    <filter id="softBlur">
      <feGaussianBlur stdDeviation="1.5"/>
    </filter>
  </defs>

  <!-- Sky + ground background -->
  <rect width="390" height="420" fill="url(#sky)"/>

  <!-- Rolling hills back -->
  <ellipse cx="100" cy="60"  rx="130" ry="60"  fill="#90c885" opacity="0.5"/>
  <ellipse cx="300" cy="50"  rx="120" ry="55"  fill="#98d090" opacity="0.45"/>
  <ellipse cx="200" cy="80"  rx="160" ry="65"  fill="#a0cc90" opacity="0.4"/>

  <!-- Winding path — goes from bottom-center, winds left then right up to top -->
  <!-- Shadow under path -->
  <path d="M 200 440
           C 200 400, 210 380, 220 355
           C 235 325, 240 305, 225 280
           C 210 255, 200 240, 195 215
           C 188 188, 175 170, 165 145
           C 155 120, 160 100, 175 75
           C 188 52, 195 30, 195 -5"
        stroke="#9a7240" stroke-width="58" fill="none" stroke-linecap="round" opacity="0.25" filter="url(#softBlur)"/>
  <!-- Main path -->
  <path d="M 200 440
           C 200 400, 210 380, 220 355
           C 235 325, 240 305, 225 280
           C 210 255, 200 240, 195 215
           C 188 188, 175 170, 165 145
           C 155 120, 160 100, 175 75
           C 188 52, 195 30, 195 -5"
        stroke="url(#pathFill)" stroke-width="52" fill="none" stroke-linecap="round"/>
  <!-- Path texture marks -->
  <path d="M 200 440
           C 200 400, 210 380, 220 355
           C 235 325, 240 305, 225 280
           C 210 255, 200 240, 195 215
           C 188 188, 175 170, 165 145
           C 155 120, 160 100, 175 75"
        stroke="#c09050" stroke-width="2" fill="none" stroke-linecap="round" stroke-dasharray="8 14" opacity="0.4"/>

  <!-- ══ RIGHT SIDE trees (top area) ══ -->
  <!-- Tree far right top -->
  <rect x="356" y="62" width="11" height="28" rx="3" fill="#7a5230"/>
  <ellipse cx="361" cy="58" rx="28" ry="26" fill="#3a8030" opacity="0.9"/>
  <ellipse cx="361" cy="48" rx="22" ry="20" fill="#4a9840" opacity="0.9"/>
  <ellipse cx="355" cy="44" rx="14" ry="13" fill="#5aaa50" opacity="0.8"/>

  <!-- Tree right mid-top -->
  <rect x="316" y="105" width="9" height="22" rx="2" fill="#7a5230"/>
  <ellipse cx="320" cy="102" rx="24" ry="22" fill="#3a8030" opacity="0.85"/>
  <ellipse cx="320" cy="93" rx="19" ry="18" fill="#4a9840" opacity="0.85"/>
  <ellipse cx="315" cy="89" rx="12" ry="11" fill="#5aaa50" opacity="0.75"/>

  <!-- Right mid bush cluster -->
  <ellipse cx="355" cy="190" rx="38" ry="30" fill="#3a8030" opacity="0.75"/>
  <ellipse cx="372" cy="182" rx="28" ry="24" fill="#4a9840" opacity="0.7"/>
  <ellipse cx="342" cy="186" rx="26" ry="22" fill="#5aaa50" opacity="0.65"/>

  <!-- Right lower bush -->
  <ellipse cx="345" cy="300" rx="42" ry="34" fill="#2e7028" opacity="0.8"/>
  <ellipse cx="368" cy="292" rx="32" ry="26" fill="#3a8030" opacity="0.75"/>
  <ellipse cx="330" cy="296" rx="28" ry="24" fill="#4a9840" opacity="0.7"/>

  <!-- Right bottom dense greenery -->
  <ellipse cx="360" cy="385" rx="50" ry="42" fill="#287020" opacity="0.85"/>
  <ellipse cx="385" cy="375" rx="38" ry="32" fill="#2e7828" opacity="0.8"/>
  <ellipse cx="338" cy="378" rx="34" ry="30" fill="#3a8030" opacity="0.78"/>

  <!-- ══ LEFT SIDE trees ══ -->
  <!-- Tree far left top -->
  <rect x="23" y="58" width="11" height="28" rx="3" fill="#7a5230"/>
  <ellipse cx="28" cy="54" rx="28" ry="26" fill="#3a8030" opacity="0.9"/>
  <ellipse cx="28" cy="44" rx="22" ry="20" fill="#4a9840" opacity="0.9"/>
  <ellipse cx="34" cy="40" rx="14" ry="13" fill="#5aaa50" opacity="0.8"/>

  <!-- Tree left mid-top -->
  <rect x="68" y="100" width="9" height="22" rx="2" fill="#7a5230"/>
  <ellipse cx="72" cy="97" rx="24" ry="22" fill="#3a8030" opacity="0.85"/>
  <ellipse cx="72" cy="88" rx="19" ry="18" fill="#4a9840" opacity="0.85"/>
  <ellipse cx="77" cy="84" rx="12" ry="11" fill="#5aaa50" opacity="0.75"/>

  <!-- Left mid bush cluster -->
  <ellipse cx="32" cy="185" rx="38" ry="30" fill="#3a8030" opacity="0.75"/>
  <ellipse cx="15" cy="177" rx="28" ry="24" fill="#4a9840" opacity="0.7"/>
  <ellipse cx="48" cy="181" rx="26" ry="22" fill="#5aaa50" opacity="0.65"/>

  <!-- Left lower bush -->
  <ellipse cx="42" cy="295" rx="42" ry="34" fill="#2e7028" opacity="0.8"/>
  <ellipse cx="18" cy="287" rx="32" ry="26" fill="#3a8030" opacity="0.75"/>
  <ellipse cx="58" cy="291" rx="28" ry="24" fill="#4a9840" opacity="0.7"/>

  <!-- Left bottom dense greenery -->
  <ellipse cx="28" cy="380" rx="50" ry="42" fill="#287020" opacity="0.85"/>
  <ellipse cx="5" cy="372" rx="38" ry="32" fill="#2e7828" opacity="0.8"/>
  <ellipse cx="52" cy="374" rx="34" ry="30" fill="#3a8030" opacity="0.78"/>

  <!-- ══ Flowers & details ══ -->
  <!-- Blue flower left mid -->
  <g transform="translate(48,250)">
    <line x1="0" y1="0" x2="0" y2="12" stroke="#5a8a3a" stroke-width="1.5"/>
    <circle cx="0" cy="-2" r="5" fill="#90c0e8" opacity="0.9"/>
    <circle cx="-4" cy="-6" r="3.5" fill="#90c0e8" opacity="0.9"/>
    <circle cx="4" cy="-6" r="3.5" fill="#90c0e8" opacity="0.9"/>
    <circle cx="0" cy="-10" r="3.5" fill="#90c0e8" opacity="0.9"/>
    <circle cx="0" cy="-4" r="3" fill="#fff8d0" opacity="0.95"/>
  </g>
  <!-- Pink flower right mid -->
  <g transform="translate(342,255)">
    <line x1="0" y1="0" x2="0" y2="12" stroke="#5a8a3a" stroke-width="1.5"/>
    <circle cx="0" cy="-2" r="5" fill="#e8a0b8" opacity="0.9"/>
    <circle cx="-4" cy="-6" r="3.5" fill="#e8a0b8" opacity="0.9"/>
    <circle cx="4" cy="-6" r="3.5" fill="#e8a0b8" opacity="0.9"/>
    <circle cx="0" cy="-10" r="3.5" fill="#e8a0b8" opacity="0.9"/>
    <circle cx="0" cy="-4" r="3" fill="#fff8d0" opacity="0.95"/>
  </g>
  <!-- Purple flower left lower -->
  <g transform="translate(75,345)">
    <line x1="0" y1="0" x2="0" y2="10" stroke="#5a8a3a" stroke-width="1.5"/>
    <circle cx="0" cy="-2" r="4.5" fill="#b898e0" opacity="0.9"/>
    <circle cx="-4" cy="-5" r="3" fill="#b898e0" opacity="0.9"/>
    <circle cx="4" cy="-5" r="3" fill="#b898e0" opacity="0.9"/>
    <circle cx="0" cy="-9" r="3" fill="#b898e0" opacity="0.9"/>
    <circle cx="0" cy="-3" r="2.5" fill="#fff8d0" opacity="0.95"/>
  </g>
  <!-- Yellow flower right lower -->
  <g transform="translate(315,340)">
    <line x1="0" y1="0" x2="0" y2="10" stroke="#5a8a3a" stroke-width="1.5"/>
    <circle cx="0" cy="-2" r="4.5" fill="#f0d060" opacity="0.9"/>
    <circle cx="-4" cy="-5" r="3" fill="#f0d060" opacity="0.9"/>
    <circle cx="4" cy="-5" r="3" fill="#f0d060" opacity="0.9"/>
    <circle cx="0" cy="-9" r="3" fill="#f0d060" opacity="0.9"/>
    <circle cx="0" cy="-3" r="2.5" fill="#fff8d0" opacity="0.95"/>
  </g>
  <!-- Bottom left flowers cluster -->
  <g transform="translate(115,400)">
    <circle cx="0" cy="0" r="4" fill="#e88090" opacity="0.9"/>
    <circle cx="-3" cy="-4" r="3" fill="#e88090" opacity="0.9"/>
    <circle cx="3" cy="-4" r="3" fill="#e88090" opacity="0.9"/>
    <circle cx="0" cy="-7" r="3" fill="#e88090" opacity="0.9"/>
    <circle cx="0" cy="-1" r="2" fill="#fff8d0"/>
  </g>
  <g transform="translate(270,405)">
    <circle cx="0" cy="0" r="4" fill="#a0c8f0" opacity="0.9"/>
    <circle cx="-3" cy="-4" r="3" fill="#a0c8f0" opacity="0.9"/>
    <circle cx="3" cy="-4" r="3" fill="#a0c8f0" opacity="0.9"/>
    <circle cx="0" cy="-7" r="3" fill="#a0c8f0" opacity="0.9"/>
    <circle cx="0" cy="-1" r="2" fill="#fff8d0"/>
  </g>

  <!-- ══ Mushrooms bottom ══ -->
  <!-- Mushroom left -->
  <rect x="88" y="400" width="8" height="16" rx="2" fill="#e8d8b0"/>
  <ellipse cx="92" cy="400" rx="14" ry="9" fill="#c04838"/>
  <circle cx="88" cy="396" r="2" fill="white" opacity="0.7"/>
  <circle cx="95" cy="394" r="1.8" fill="white" opacity="0.7"/>
  <!-- Mushroom right small -->
  <rect x="295" y="408" width="6" height="12" rx="2" fill="#e8d8b0"/>
  <ellipse cx="298" cy="408" rx="11" ry="7" fill="#8b5e3c"/>
  <!-- Mushroom right -->
  <rect x="310" y="400" width="8" height="15" rx="2" fill="#e8d8b0"/>
  <ellipse cx="314" cy="400" rx="13" ry="8" fill="#c05840"/>
  <circle cx="310" cy="396" r="1.8" fill="white" opacity="0.7"/>
  <circle cx="317" cy="394" r="1.5" fill="white" opacity="0.7"/>

  <!-- Rocks -->
  <ellipse cx="55" cy="415" rx="22" ry="13" fill="#a8a8a8" opacity="0.55"/>
  <ellipse cx="45" cy="411" rx="16" ry="10" fill="#c0c0c0" opacity="0.5"/>
  <ellipse cx="340" cy="412" rx="20" ry="12" fill="#a8a8a8" opacity="0.55"/>

  <!-- Ground cover bottom -->
  <ellipse cx="195" cy="430" rx="230" ry="45" fill="#3a7a28" opacity="0.55"/>
  <ellipse cx="195" cy="440" rx="260" ry="40" fill="#2e6a20" opacity="0.5"/>
</svg>
