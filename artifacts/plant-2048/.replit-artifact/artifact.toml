kind = "web"
previewPath = "/"
title = "식물 2048"
version = "1.0.0"
id = "artifacts/plant-2048"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21480

[services.development]
run = "pnpm --filter @workspace/plant-2048 run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/plant-2048", "run", "build" ]
publicDir = "artifacts/plant-2048/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21480"
BASE_PATH = "/"
